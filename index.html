const makeEstoqueInicial = () => {
  const e = {};
  PRODUTOS_RAW.forEach(p => { e[p.id] = 0; });
  return e;
};

const formatTs = (ts) => {
  if (!ts) return "-";
  const d = new Date(ts);
  return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
};
const formatDate = (ts) => {
  if (!ts) return "-";
  const d = new Date(ts);
  return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;
};
const today = () => new Date().toISOString();

// MAIN APP
// ============================================================
// Date mask helper — available everywhere
function maskData(rawValue) {
  const digits = rawValue.replace(/\D/g, "").slice(0, 8);
  const d = digits;
  if (d.length <= 2) return d;
  if (d.length <= 4) return d.slice(0,2) + "/" + d.slice(2);
  let ano = d.slice(4, 8);
  if (ano.length === 2 && parseInt(ano) < 100) ano = "20" + ano;
  return d.slice(0,2) + "/" + d.slice(2,4) + "/" + ano;
}

const STORAGE_KEY = "hva_estoque_v2";

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function saveToStorage(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

var _fsTimer = null;
function saveToFirestore(data) {
  if (typeof window.db === "undefined") return;
  clearTimeout(_fsTimer);
  _fsTimer = setTimeout(function() {
    window.db.collection("hva_estoque").doc("main").set(data)
      .catch(function(e) { console.warn("Firestore save:", e); });
  }, 1500);
}
function loadFromFirestore(cb) {
  if (typeof window.db === "undefined") { cb(null); return; }
  window.db.collection("hva_estoque").doc("main").get()
    .then(function(doc) { cb(doc.exists ? doc.data() : null); })
    .catch(function(e) { console.warn("Firestore load:", e); cb(null); });
}

function App() {
  // Load once synchronously before any useState — avoids useMemo timing issues
  const saved = loadFromStorage();

  const [estoques, setEstoques] = useState(() => {
    if (saved?.estoques) {
      const base = makeEstoqueInicial();
      return { ...base, ...saved.estoques };
    }
    return makeEstoqueInicial();
  });
  const [minMax, setMinMax] = useState(() => {
    if (saved?.minMax) return saved.minMax;
    const m = {};
    PRODUTOS_RAW.forEach(p => { m[p.id] = { min: p.min, max: p.max }; });
    return m;
  });
  const [movimentacoes, setMovimentacoes] = useState(() => saved?.movimentacoes || []);
  const [conferencias, setConferencias] = useState(() => saved?.conferencias || []);
  const [pedidos, setPedidos] = useState(() => saved?.pedidos || []);

  const [activeTab, setActiveTab] = useState("estoque");
  // Show restore prompt if this is a fresh open but localStorage has data from a previous session
  const [showRestoreBanner, setShowRestoreBanner] = useState(() => {
    return !!(saved?.movimentacoes?.length || saved?.lotesRegistrados?.length || saved?.pedidos?.length);
  });
  const [firestoreStatus, setFirestoreStatus] = useState("connecting");

  useEffect(() => {
    loadFromFirestore(function(data) {
      if (!data) { setFirestoreStatus("offline"); return; }
      setEstoques(function(prev) { return Object.assign({}, prev, data.estoques); });
      if (data.minMax) setMinMax(data.minMax);
      if (data.movimentacoes) setMovimentacoes(data.movimentacoes);
      if (data.conferencias) setConferencias(data.conferencias);
      if (data.pedidos) setPedidos(data.pedidos);
      if (data.lotesRegistrados) setLotesRegistrados(data.lotesRegistrados);
      if (data.produtosCustom) setProdutosCustom(data.produtosCustom);
      setFirestoreStatus("ok");
      saveToStorage(data);
    });
  }, []);
  const [selectedTabela, setSelectedTabela] = useState("clinicos");

  const [modalBaixa, setModalBaixa] = useState(null); // { produto }
  const [baixaQtd, setBaixaQtd] = useState("");
  const [baixaResp, setBaixaResp] = useState("Aretha Dalcorso");
  const [baixaObs, setBaixaObs] = useState("");

  const addLote = () => setEntradaLotes(prev => [...prev, { lote: "", validade: "", qtd: "" }]);
  const removeLote = (i) => setEntradaLotes(prev => prev.filter((_, idx) => idx !== i));
  const updateLote = (i, field, val) => setEntradaLotes(prev => prev.map((l, idx) => idx === i ? { ...l, [field]: val } : l));
  const totalEntrada = entradaLotes.reduce((s, l) => s + (parseFloat(l.qtd) || 0), 0);

  // All lotes across all products: { produtoId, lote, validade, qtd, ts }
  const [lotesRegistrados, setLotesRegistrados] = useState(() => saved?.lotesRegistrados || []);

  // Conferência ativa
  const [confAtiva, setConfAtiva] = useState(false);

  const [showConfModal, setShowConfModal] = useState(false);

  const [consumoDe, setConsumoDe] = useState("");           // DD/MM/AAAA
  const [consumoAte, setConsumoAte] = useState("");         // DD/MM/AAAA
  const [produtoExpandido, setProdutoExpandido] = useState(null); // product opened from search
  const [showBackupModal, setShowBackupModal] = useState(false);
  const [importError, setImportError] = useState("");
  const [showNovoProduto, setShowNovoProduto] = useState(false);
  const [novoProduto, setNovoProduto] = useState({ tabela: "clinicos", grupo: "", nome: "", unidade: "un", min: "", max: "" });
  const [produtosCustom, setProdutosCustom] = useState(() => saved?.produtosCustom || []);

  // Auto-save to localStorage on every state change
  useEffect(() => {
    saveToStorage({ estoques, minMax, movimentacoes, conferencias, pedidos, lotesRegistrados, produtosCustom });
  }, [estoques, minMax, movimentacoes, conferencias, pedidos, lotesRegistrados]);

  // Export data as JSON file
  const exportarDados = () => {
    const data = { estoques, minMax, movimentacoes, conferencias, pedidos, lotesRegistrados,
      exportadoEm: new Date().toISOString(), versao: "2.0" };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const ts = new Date();
    const nome = `HVA_backup_${ts.getFullYear()}${String(ts.getMonth()+1).padStart(2,"0")}${String(ts.getDate()).padStart(2,"0")}.json`;
    a.href = url; a.download = nome; a.click();
    URL.revokeObjectURL(url);
  };

  // Import data from JSON file
  const importarDados = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.estoques || !data.movimentacoes) throw new Error("Arquivo inválido");
        setEstoques(prev => ({ ...makeEstoqueInicial(), ...data.estoques }));
        if (data.minMax) setMinMax(data.minMax);
        if (data.movimentacoes) setMovimentacoes(data.movimentacoes);
        if (data.conferencias) setConferencias(data.conferencias);
        if (data.pedidos) setPedidos(data.pedidos);
        if (data.lotesRegistrados) setLotesRegistrados(data.lotesRegistrados);
        if (data.produtosCustom) setProdutosCustom(data.produtosCustom);
        setImportError("");
        setShowBackupModal(false);
        alert("✅ Dados importados com sucesso!");
      } catch (err) {
        setImportError("Arquivo inválido. Selecione um backup gerado por este sistema.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };
  const [pedidoResp, setPedidoResp] = useState("Aretha Dalcorso");
  const [pedidoObs, setPedidoObs] = useState("");
  const [pedidoCustom, setPedidoCustom] = useState({}); // override qtd sugerida

  const todosProdutos = useMemo(() => [...PRODUTOS_RAW, ...produtosCustom], [produtosCustom]);

  const produtosPorTabela = useMemo(() => {
    const map = {};
    todosProdutos.forEach(p => {
      if (!map[p.tabela]) map[p.tabela] = {};
      if (!map[p.tabela][p.grupo]) map[p.tabela][p.grupo] = [];
      map[p.tabela][p.grupo].push(p);
    });
    return map;
  }, [todosProdutos]);

  const gMin = (p) => minMax[p.id]?.min ?? p.min;
  const gMax = (p) => minMax[p.id]?.max ?? p.max;
  const setMin = (id, val) => setMinMax(prev => ({ ...prev, [id]: { ...prev[id], min: val === "" ? null : Number(val) } }));
  const setMax = (id, val) => setMinMax(prev => ({ ...prev, [id]: { ...prev[id], max: val === "" ? null : Number(val) } }));

  const getStatus = useCallback((p) => {
    const qt = estoques[p.id] ?? 0;
    const mn = minMax[p.id]?.min ?? p.min;
    const mx = minMax[p.id]?.max ?? p.max;
    if (mn === null || mx === null) return { tipo: "sem-minimo", label: "Sem mínimo definido", cor: "#e2e8f0", corT: "#64748b" };
    if (qt === 0) return { tipo: "zerado", label: "⚠ Sem estoque", cor: "#fee2e2", corT: "#991b1b" };
    if (qt < mn) return { tipo: "baixo", label: "↓ Abaixo do mín", cor: "#fef3c7", corT: "#92400e" };
    if (qt >= mx) return { tipo: "cheio", label: "✓ Estoque cheio", cor: "#dcfce7", corT: "#166534" };
    return { tipo: "ok", label: "✓ OK", cor: "#dcfce7", corT: "#166534" };
  }, [estoques, minMax]);

  const itensFaltando = useMemo(() =>
    todosProdutos.filter(p => {
      const mn = minMax[p.id]?.min ?? p.min;
      if (mn === null) return false;
      return (estoques[p.id] ?? 0) < mn;
    }),
  [estoques, minMax, todosProdutos]);

  // ---- BAIXA ----
  const confirmarBaixa = () => {
    const qtd = parseFloat(baixaQtd);
    if (!qtd || qtd <= 0 || !baixaResp.trim()) return;
    const p = modalBaixa;
    // Deduct from specific lote if one was selected
    if (baixaLoteId) {
      setLotesRegistrados(prev => prev.map(l => {
        if (l.id !== baixaLoteId) return l;
        const novaQtd = Math.max(0, (parseFloat(l.qtd) || 0) - qtd);
        return { ...l, qtd: novaQtd };
      }));
    }
    setEstoques(prev => ({ ...prev, [p.id]: Math.max(0, (prev[p.id] ?? 0) - qtd) }));
    // Find lote info for obs
    const loteInfo = baixaLoteId ? lotesRegistrados.find(l => l.id === baixaLoteId) : null;
    const obsLote = loteInfo ? `[Lote ${loteInfo.lote || "s/nº"}${loteInfo.validade ? " Val:"+loteInfo.validade : ""}] ` : "";
    setMovimentacoes(prev => [{
      id: Date.now().toString(),
      produtoId: p.id,
      tipo: "baixa",
      qtd,
      responsavel: baixaResp.trim(),
      obs: obsLote + baixaObs.trim(),
      ts: today(),
    }, ...prev]);
    setModalBaixa(null); setBaixaQtd(""); setBaixaResp("Aretha Dalcorso"); setBaixaObs(""); setBaixaLoteId(null);
  };

  // ---- ENTRADA ----
  const confirmarEntrada = () => {
    const lotesValidos = entradaLotes.filter(l => parseFloat(l.qtd) > 0);
    if (!totalEntrada || !entradaResp.trim() || lotesValidos.length === 0) return;
    const p = modalEntrada;
    const ts = today();
    // Update stock
    setEstoques(prev => ({ ...prev, [p.id]: (prev[p.id] ?? 0) + totalEntrada }));
    // Save movement
    const resumoLotes = lotesValidos.map(l => `Lote ${l.lote||"s/n"} — Val: ${l.validade||"—"} — ${l.qtd} ${p.unidade}`).join(" | ");
    setMovimentacoes(prev => [{
      id: Date.now().toString(),
      produtoId: p.id,
      tipo: "entrada",
      qtd: totalEntrada,
      responsavel: entradaResp.trim(),
      obs: resumoLotes,
      ts,
    }, ...prev]);
    // Save each lote
    const novosLotes = lotesValidos.map((l, i) => ({
      id: Date.now().toString() + i,
      produtoId: p.id,
      lote: l.lote.trim() || "s/n",
      validade: l.validade,
      qtd: parseFloat(l.qtd),
      ts,
      responsavel: entradaResp.trim(),
    }));
    setLotesRegistrados(prev => [...novosLotes, ...prev]);
    setModalEntrada(null);
    setEntradaLotes([{ lote: "", validade: "", qtd: "" }]);
    setEntradaResp("Aretha Dalcorso");
  };

  // ---- CONFERÊNCIA ----
  const iniciarConferencia = () => { setConfAtiva(true); setConfChecked({}); };
  const cancelarConferencia = () => { setConfAtiva(false); setConfChecked({}); };
  const toggleCheck = (id) => setConfChecked(p => ({ ...p, [id]: !p[id] }));
  const toggleGrupoCheck = (ids) => {
    const allChecked = ids.every(id => confChecked[id]);
    setConfChecked(p => { const n = {...p}; ids.forEach(id => n[id] = !allChecked); return n; });
  };
  const salvarConferencia = () => {
    if (!confResp.trim()) return;
    const itensConferidos = Object.keys(confChecked).filter(k => confChecked[k]);
    setConferencias(prev => [{
      id: Date.now().toString(),
      ts: today(),
      responsavel: confResp,
      itens: itensConferidos,
      obs: confObs,
    }, ...prev]);
    setConfAtiva(false); setConfChecked({}); setConfResp("Aretha Dalcorso"); setConfObs("");
    setShowConfModal(false);
  };

  // ---- NOVO PRODUTO ----
  const adicionarProduto = () => {
    const np = novoProduto;
    if (!np.nome.trim() || !np.grupo.trim()) return;
    const id = "custom-" + Date.now();
    const prod = { id, tabela: np.tabela, grupo: np.grupo.trim(), nome: np.nome.trim(),
      unidade: np.unidade || "un", min: np.min !== "" ? Number(np.min) : null,
      max: np.max !== "" ? Number(np.max) : null, custom: true };
    setProdutosCustom(prev => [...prev, prod]);
    setEstoques(prev => ({ ...prev, [id]: 0 }));
    setMinMax(prev => ({ ...prev, [id]: { min: prod.min, max: prod.max } }));
    setNovoProduto({ tabela: "clinicos", grupo: "", nome: "", unidade: "un", min: "", max: "" });
    setShowNovoProduto(false);
  };

  // ---- PEDIDO ----
  const gerarPedido = () => {
    if (!pedidoResp.trim() || itensFaltando.length === 0) return;
    const itens = itensFaltando.map(p => ({
      produtoId: p.id,
      qtdSolicitada: parseFloat(pedidoCustom[p.id]) || (Math.max(0, (gMax(p)||0) - (estoques[p.id]||0))),
    }));
    const novoPedido = {
      id: Date.now().toString(),
      ts: today(),
      responsavel: pedidoResp,
      itens,
      obs: pedidoObs,
      status: "aberto",
    };
    setPedidos(prev => [novoPedido, ...prev]);
    setShowPedidoModal(false); setPedidoResp("Aretha Dalcorso"); setPedidoObs(""); setPedidoCustom({});
    // Open PDF in new tab automatically
    setTimeout(() => gerarPDFExterno(novoPedido, produtoById), 100);
  };

  const produtoById = useMemo(() => {
    const m = {};
    todosProdutos.forEach(p => m[p.id] = p);
    return m;
  }, [todosProdutos]);

  const TABELAS = [
    { id: "clinicos", label: "🩺 Clínicos / Cirúrgicos" },
    { id: "controlados", label: "🔒 Controlados" },
    { id: "injetaveis", label: "💉 Injetáveis / Vacinas" },
  ];

  const gruposAtivos = produtosPorTabela[selectedTabela] || {};

  // ============================================================
  // RENDER
  // ============================================================
  return (
    <div style={{ fontFamily: "'Segoe UI', system-ui, sans-serif", minHeight: "100vh", background: "#f1f5f1", color: "#1a1a1a" }}>

      {/* HEADER */}
      <div style={{ background: "linear-gradient(135deg,#0d2b1e 0%,#1a4f3a 100%)", color: "#fff", padding: "14px 20px", boxShadow: "0 2px 12px rgba(0,0,0,.35)" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 28 }}>🏥</span>
            <div>
              <div style={{ fontSize: 18, fontWeight: 800 }}>HVA — Gestão de Estoque</div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 11, color: "#86efac" }}>Hospital Veterinário Araújo · v2.0</span>
                <span style={{ fontSize: 10, fontWeight: 700, padding: "1px 7px", borderRadius: 10,
                  background: firestoreStatus === "ok" ? "rgba(255,255,255,0.2)" : firestoreStatus === "connecting" ? "rgba(255,220,50,0.3)" : "rgba(255,100,100,0.3)",
                  color: firestoreStatus === "ok" ? "#bbf7d0" : firestoreStatus === "connecting" ? "#fef08a" : "#fca5a5" }}>
                  {firestoreStatus === "ok" ? "☁ nuvem" : firestoreStatus === "connecting" ? "⟳ conectando..." : "⚠ offline"}
                </span>
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {itensFaltando.length > 0 && (
              <div style={{ background: "#dc2626", color: "#fff", padding: "6px 12px", borderRadius: 20, fontSize: 12, fontWeight: 700, cursor: "pointer" }}
                onClick={() => setActiveTab("pedidos")}>

            <button onClick={() => setShowBackupModal(true)} style={btnStyle("#334155","#e2e8f0")}>
              💾 Backup
            </button>
            <button onClick={() => { setShowPedidoModal(true); }} style={btnStyle("#f59e0b","#78350f")}>
              🛒 Gerar Pedido de Compra
            </button>

          {[
            { id: "estoque", label: "📦 Estoque" },
            { id: "movimentacoes", label: "📋 Movimentações" },
            { id: "conferencias", label: "✅ Conferências" },
            { id: "pedidos", label: `🛒 Pedidos${pedidos.length ? " ("+pedidos.length+")" : ""}` },
            { id: "lotes", label: `💊 Lotes / Validades${lotesRegistrados.length ? " ("+lotesRegistrados.length+")" : ""}` },
            { id: "consumo", label: "📊 Consumo" },
          ].map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)}
              style={{ padding: "13px 20px", border: "none", cursor: "pointer", fontSize: 13, fontWeight: 600, borderBottom: activeTab===t.id ? "3px solid #1a4f3a" : "3px solid transparent",
                background: "transparent", color: activeTab===t.id ? "#1a4f3a" : "#6b7280", transition: "all .15s" }}>
              {t.label}

        <div style={{ borderTop: "1px solid #f3f4f6", padding: "8px 16px", background: "#fafafa" }}>

            <input

                activeTab === "movimentacoes" ? "Filtrar movimentações por produto..." :
                activeTab === "pedidos" ? "Filtrar pedidos por produto..." :
                activeTab === "consumo" ? "Filtrar consumo por produto..." :
                "Buscar produto em qualquer tabela... (ex: propofol, seringa 3ml, fio nylon)"
              }
              style={{ width: "100%", padding: "8px 36px 8px 36px", borderRadius: 8, border: "1.5px solid #d1d5db", fontSize: 13, background: "#fff", outline: "none" }}
            />
            {busca && (
              <button onClick={() => setBusca("")}
                style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#9ca3af", lineHeight: 1 }}>
                ✕
              </button>
            )}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "20px 16px" }}>

        {/* ── Restore banner ── shows once per session when data is detected in localStorage */}
        {showRestoreBanner && (
          <div style={{ background: "#f0fdf4", border: "2px solid #86efac", borderRadius: 10, padding: "14px 18px", marginBottom: 16, display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
            <div style={{ fontSize: 22 }}>✅</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 800, fontSize: 14, color: "#166534" }}>Dados locais carregados — sincronizando com a nuvem...</div>
              <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2 }}>
                {saved?.movimentacoes?.length || 0} movimentações · {saved?.lotesRegistrados?.length || 0} lotes · {saved?.pedidos?.length || 0} pedidos. Os dados da nuvem serão aplicados em instantes.
              </div>
            </div>
            <button onClick={() => setShowRestoreBanner(false)}
              style={{ padding: "6px 14px", background: "#166534", color: "#fff", border: "none", borderRadius: 7, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
              OK, entendido
            </button>
          </div>
        )}

        {/* ============================== ABA ESTOQUE ============================== */}
        {activeTab === "estoque" && (
          <div>

            {/* RESULTADOS DE BUSCA */}
            {busca.trim() ? (
              <BuscaResultados
                termo={busca.trim()}
                todosProdutos={todosProdutos}
                estoques={estoques}
                minMax={minMax}
                lotesRegistrados={lotesRegistrados}
                getStatus={getStatus}
                gMin={gMin}
                gMax={gMax}
                setModalBaixa={setModalBaixa}
                setBaixaQtd={setBaixaQtd}
                setBaixaObs={setBaixaObs}
                setModalEntrada={setModalEntrada}
                setEntradaLotes={setEntradaLotes}
                produtoExpandido={produtoExpandido}
                setProdutoExpandido={setProdutoExpandido}
              />
            ) : (
              <div>
                {/* Seletor de tabela + botão conferência */}
                <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 16, alignItems: "center" }}>
                  <div style={{ display: "flex", gap: 6 }}>
                    {TABELAS.map(t => (
                      <button key={t.id} onClick={() => setSelectedTabela(t.id)}
                        style={{ padding: "8px 14px", borderRadius: 8, border: "2px solid", cursor: "pointer", fontSize: 12, fontWeight: 700, transition: "all .15s",
                          borderColor: selectedTabela===t.id ? "#1a4f3a" : "#d1d5db",
                          background: selectedTabela===t.id ? "#1a4f3a" : "#fff",
                          color: selectedTabela===t.id ? "#fff" : "#374151" }}>
                        {t.label}
                      </button>
                    ))}
                  </div>
                  <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
                    {confAtiva ? (
                      <>
                        <button onClick={() => setShowConfModal(true)} style={btnStyle("#1a4f3a","#fff")}>
                          💾 Salvar Conferência ({Object.values(confChecked).filter(Boolean).length} itens)
                        </button>
                        <button onClick={cancelarConferencia} style={btnStyle("#6b7280","#fff")}>Cancelar</button>
                      </>
                    ) : (
                      <>
                        <button onClick={() => setShowNovoProduto(true)} style={btnStyle("#334155","#e2e8f0")}>
                          ➕ Novo Produto
                        </button>
                        <button onClick={iniciarConferencia} style={btnStyle("#0f2d1f","#86efac")}>
                          🔍 Iniciar Conferência
                        </button>
                      </>
                    )}
                  </div>
                </div>

                {confAtiva && (
                  <div style={{ background: "#fffbeb", border: "1px solid #fcd34d", borderRadius: 8, padding: "10px 14px", marginBottom: 12, fontSize: 13, color: "#78350f" }}>
                    🔍 <strong>Modo Conferência ativo</strong> — Marque os itens que foram conferidos fisicamente. Ao terminar, clique em <strong>Salvar Conferência</strong>.
                  </div>
                )}

                {/* Grupos */}
                {Object.entries(gruposAtivos).map(([grupo, produtos]) => {
                  const isOpen = expandedGrupos[grupo] !== false;
                  const idsGrupo = produtos.map(p => p.id);
                  const allChecked = confAtiva && idsGrupo.every(id => confChecked[id]);
                  const someAlerts = produtos.some(p => { const mn = minMax[p.id]?.min ?? p.min; return mn !== null && (estoques[p.id] ?? 0) < (mn || 0); });
                  return (
                    <div key={grupo} style={{ background: "#fff", borderRadius: 10, marginBottom: 10, overflow: "hidden", boxShadow: "0 1px 3px rgba(0,0,0,.07)" }}>
                      <div style={{ display: "flex", alignItems: "center", padding: "11px 14px", background: "#f8fafc", borderBottom: isOpen ? "1px solid #e5e7eb" : "none", cursor: "pointer" }}
                        onClick={() => setExpandedGrupos(p => ({ ...p, [grupo]: !isOpen }))}>
                        {confAtiva && (
                          <input type="checkbox" checked={allChecked} onChange={() => toggleGrupoCheck(idsGrupo)}
                            onClick={e => e.stopPropagation()}
                            style={{ marginRight: 10, width: 16, height: 16, accentColor: "#1a4f3a", cursor: "pointer" }} />
                        )}
                        <span style={{ fontSize: 16, marginRight: 8 }}>{isOpen ? "▾" : "▸"}</span>
                        <span style={{ fontWeight: 700, fontSize: 14, color: "#1a4f3a" }}>{grupo}</span>

        {/* ============================== ABA CONFERÊNCIAS ============================== */}

        {/* ============================== ABA PEDIDOS ============================== */}

            const t = busca.trim().toLowerCase();

          return (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: "#1a4f3a" }}>🛒 Pedidos de Compra</h2>
              {itensFaltando.length > 0 && (
                <span style={{ background: "#fee2e2", color: "#991b1b", padding: "4px 12px", borderRadius: 20, fontSize: 12, fontWeight: 700 }}>

            {/* Alerta de itens faltando — compacto */}

              <div style={{ background: "#fff5f5", border: "1.5px solid #fca5a5", borderRadius: 10, marginBottom: 16, padding: "12px 16px", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>

                  <div style={{ fontWeight: 700, color: "#991b1b", fontSize: 13, marginBottom: 4 }}>

                  </div>
                  <div style={{ fontSize: 12, color: "#6b7280" }}>
                    {itensFaltando.slice(0,4).map(p => p.nome).join(", ")}{itensFaltando.length > 4 ? ` e mais ${itensFaltando.length-4}...` : ""}
                  </div>
                </div>
                <button onClick={() => setShowPedidoModal(true)}
                  style={{ ...btnStyle("#dc2626","#fff"), whiteSpace: "nowrap" }}>
                  🛒 Gerar pedido agora
                </button>
              </div>
            )}

            {/* Lista de pedidos */}
            {pedidosFiltrados.length === 0 && busca.trim() ? (
              <div style={{ background: "#fff", borderRadius: 10, padding: "32px", textAlign: "center", color: "#9ca3af" }}>
                <div style={{ fontSize: 28, marginBottom: 8 }}>🔍</div>
                <div style={{ fontWeight: 600 }}>Nenhum pedido contém "{busca.trim()}"</div>
              </div>
            ) : pedidosFiltrados.length === 0 ? (
              <EmptyState icon="🛒" msg="Nenhum pedido gerado ainda." sub="Clique em '+ Novo Pedido' para criar o primeiro." />
            ) : (
              <div style={{ background: "#fff", borderRadius: 10, overflow: "hidden", boxShadow: "0 1px 3px rgba(0,0,0,.07)" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                  <thead>
                    <tr style={{ background: "#f9fafb", borderBottom: "2px solid #e5e7eb" }}>
                      <th style={{ ...TH, textAlign: "left", paddingLeft: 16 }}>Data</th>
                      <th style={{ ...TH, textAlign: "left" }}>Responsável</th>
                      <th style={TH}>Itens</th>
                      <th style={TH}>Status</th>
                      <th style={TH}>Ações</th>
                    </tr>
                  </thead>
                  <tbody>
                    {pedidosFiltrados.map((ped, idx) => (
                      <React.Fragment key={ped.id}>
                        <tr
                          onClick={() => setProdutoExpandido(prev => prev === "ped-"+ped.id ? null : "ped-"+ped.id)}
                          style={{ borderBottom: "1px solid #f3f4f6", background: produtoExpandido==="ped-"+ped.id ? "#fffbeb" : idx%2===0?"#fff":"#fafafa", cursor: "pointer" }}>
                          <td style={{ ...TD, textAlign: "left", paddingLeft: 16 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                              <span style={{ fontSize: 12, color: "#9ca3af" }}>{produtoExpandido==="ped-"+ped.id ? "▾" : "▸"}</span>
                              <div>
                                <div style={{ fontWeight: 700, color: "#92400e" }}>{formatDate(ped.ts)}</div>
                                <div style={{ fontSize: 11, color: "#9ca3af" }}>{formatTs(ped.ts)}</div>
                              </div>
                            </div>
                          </td>
                          <td style={{ ...TD, textAlign: "left", fontWeight: 500 }}>{ped.responsavel}</td>
                          <td style={{ ...TD }}>
                            <span style={{ background: "#e0f2fe", color: "#0369a1", padding: "2px 8px", borderRadius: 12, fontSize: 11, fontWeight: 700 }}>
                              {ped.itens.length} itens

                          </td>
                          <td style={TD}>
                            <span style={{ background: ped.status==="recebido"?"#dcfce7":"#fef3c7", color: ped.status==="recebido"?"#166534":"#92400e", padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700 }}>
                              {ped.status === "recebido" ? "✓ Recebido" : "⏳ Aberto"}
                            </span>
                          </td>
                          <td style={{ ...TD, whiteSpace: "nowrap" }} onClick={e => e.stopPropagation()}>
                            <button onClick={() => gerarPDFExterno(ped, produtoById)}
                              style={{ ...btnSmall, background: "#e0f2fe", color: "#0369a1", marginRight: 5 }}>
                              📄 PDF
                            </button>
                            {ped.status === "aberto" && (
                              <button onClick={() => setPedidos(prev => prev.map(p => p.id===ped.id ? {...p, status:"recebido"} : p))}
                                style={{ ...btnSmall, background: "#dcfce7", color: "#166534" }}>
                                ✓ Recebido
                              </button>

                        {produtoExpandido === "ped-"+ped.id && (
                          <tr style={{ background: "#fffbeb" }}>
                            <td colSpan={5} style={{ padding: "0 16px 16px 42px" }}>
                              {ped.obs && (
                                <div style={{ paddingTop: 10, paddingBottom: 6, fontSize: 12, color: "#92400e" }}>

                                    <th style={{ ...TH, textAlign: "left", color: "#fff" }}>Produto</th>
                                    <th style={{ ...TH, color: "#fff" }}>Qtd solicitada</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {ped.itens.map((it, i) => {
                                    const p = produtoById[it.produtoId];
                                    return (
                                      <tr key={it.produtoId} style={{ borderBottom: "1px solid #f3f4f6", background: i%2===0?"#fff":"#fafafa" }}>
                                        <td style={{ ...TD, textAlign: "left" }}>{p?.nome || it.produtoId}</td>
                                        <td style={{ ...TD, fontWeight: 700 }}>{it.qtdSolicitada} {p?.unidade}</td>
                                      </tr>
                                    );
                                  })}
                                </tbody>
                              </table>
                              <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
                                <button onClick={() => gerarPDFExterno(ped, produtoById)}
                                  style={{ ...btnStyle("#1a4f3a","#fff"), fontSize: 12 }}>
                                  📄 Abrir / Salvar PDF
                                </button>
                                {ped.status === "aberto" && (
                                  <button onClick={() => setPedidos(prev => prev.map(p => p.id===ped.id ? {...p, status:"recebido"} : p))}
                                    style={{ ...btnStyle("#166534","#fff"), fontSize: 12 }}>
                                    ✓ Marcar como recebido
                                  </button>
                                )}
                              </div>
                            </td>
                          </tr>
                        )}
                      </React.Fragment>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
          );
        })()}

        {/* ============================== ABA LOTES / VALIDADES ============================== */}
        {activeTab === "lotes" && (() => {
          // Parse DD/MM/AAAA -> Date
          const parseVal = (v) => {
            if (!v) return null;
            const p = v.split("/");
            if (p.length !== 3) return null;
            let yr = parseInt(p[2]);
            if (isNaN(yr)) return null;
            if (yr < 100) yr = 2000 + yr;
            const d = new Date(yr, parseInt(p[1])-1, parseInt(p[0]));
            return isNaN(d.getTime()) ? null : d;
          };
          return (
          <div>
            {/* Header + filtro */}
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
              <h2 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: "#1a4f3a" }}>💊 Controle de Lotes e Validades</h2>
              <span style={{ background: "#e0f2fe", color: "#0369a1", padding: "3px 10px", borderRadius: 20, fontSize: 12, fontWeight: 700 }}>{lotesRegistrados.length} lotes registrados</span>
              <div style={{ marginLeft: "auto", display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 3 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, background: "#fff", border: "1.5px solid #d1d5db", borderRadius: 8, padding: "5px 10px" }}>
                  <span style={{ fontSize: 12, color: "#6b7280", whiteSpace: "nowrap" }}>📅 Mostrar até:</span>
                  <input type="text" value={filtroDataRef}
                    onChange={e => setFiltroDataRef(maskData(e.target.value))}
                    style={{ width: 100, padding: "3px 6px", borderRadius: 6, border: "1.5px solid #d1d5db", fontSize: 13, textAlign: "center" }}
                    placeholder="DD/MM/AAAA" maxLength={10} />
                  <button onClick={() => setFiltroDataRef("")} style={{ ...btnSmall, background: "#f3f4f6", color: "#374151" }}>Todos</button>
                </div>
                {(() => {
                  if (!filtroDataRef || filtroDataRef.length < 8) return null;
                  const p = filtroDataRef.split("/");
                  if (p.length!==3||p[2].length!==4) return null;
                  const d = new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
                  if (isNaN(d.getTime())) return null;
                  const hoje = new Date(); hoje.setHours(0,0,0,0);
                  const diff = Math.ceil((d - hoje)/86400000);
                  return <span style={{ fontSize: 11, color: diff < 0 ? "#dc2626" : diff <= 30 ? "#d97706" : "#6b7280" }}>
                    {diff < 0 ? `${Math.abs(diff)} dias atrás` : diff === 0 ? "hoje" : `faltam ${diff} dias`}
                  </span>;
                })()}
              </div>
            </div>

            {/* Alertas de validade */}
            {(() => {
              const hoje = new Date();
              const vencidos = lotesRegistrados.filter(l => { const d = parseVal(l.validade); return d && d < hoje; });
              const em30 = lotesRegistrados.filter(l => {
                if (!l.validade) return false;
                const d = parseVal(l.validade);
                if (!d) return false;
                const diff = (d - hoje) / 86400000;
                return diff >= 0 && diff <= 30;
              });
              return (
                <>
                  {vencidos.length > 0 && (
                    <div style={{ background: "#fee2e2", border: "1px solid #fca5a5", borderRadius: 8, padding: "10px 14px", marginBottom: 10, fontSize: 13, color: "#991b1b", fontWeight: 700 }}>
                      🚨 {vencidos.length} lote(s) VENCIDO(S) — verifique imediatamente!
                    </div>
                  )}
                  {em30.length > 0 && (
                    <div style={{ background: "#fef3c7", border: "1px solid #fcd34d", borderRadius: 8, padding: "10px 14px", marginBottom: 10, fontSize: 13, color: "#92400e", fontWeight: 700 }}>
                      ⚠️ {em30.length} lote(s) vencendo nos próximos 30 dias
                    </div>
                  )}
                </>
              );
            })()}

            {lotesRegistrados.length === 0 ? (
              <EmptyState icon="💊" msg="Nenhum lote registrado ainda." sub="Registre uma entrada de produto com dados de lote para aparecer aqui." />
            ) : (
              <div style={{ background: "#fff", borderRadius: 10, overflow: "hidden", boxShadow: "0 1px 3px rgba(0,0,0,.07)" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                  <thead>
                    <tr style={{ background: "#f9fafb", borderBottom: "1px solid #e5e7eb" }}>
                      <th style={{ ...TH, textAlign: "left" }}>Produto</th>
                      <th style={TH}>Lote</th>
                      <th style={TH}>Validade</th>
                      <th style={TH}>Dias restantes</th>
                      <th style={TH}>Qtd recebida</th>
                      <th style={TH}>Responsável</th>
                      <th style={TH}>Data entrada</th>
                    </tr>
                  </thead>
                  <tbody>
                    {[...lotesRegistrados]
                      .filter(l => {
                        if (busca.trim()) {
                          const p = produtoById[l.produtoId];
                          const t = busca.trim().toLowerCase();
                          if (!(p?.nome||"").toLowerCase().includes(t) && !(p?.grupo||"").toLowerCase().includes(t) && !(l.lote||"").toLowerCase().includes(t)) return false;
                        }
                        if (!filtroDataRef || filtroDataRef.length < 8) return true;
                        const pts = filtroDataRef.split("/");
                        if (pts.length!==3||pts[2].length!==4) return true;
                        const limite = new Date(parseInt(pts[2]),parseInt(pts[1])-1,parseInt(pts[0]));
                        if (isNaN(limite.getTime())) return true;
                        const d = parseVal(l.validade);
                        if (!d) return true;
                        return d <= limite;
                      })
                      .sort((a, b) => {
                        const da = parseVal(a.validade), db = parseVal(b.validade);
                        if (!da) return 1;
                        if (!db) return -1;
                        return da - db;
                      }).map((l, idx) => {
                      const p = produtoById[l.produtoId];
                      const hoje = new Date(); hoje.setHours(0,0,0,0);
                      const dVal = parseVal(l.validade);
                      const diasRestantes = dVal ? Math.ceil((dVal - hoje) / 86400000) : null;
                      const vencido = diasRestantes !== null && diasRestantes < 0;
                      const urgente = diasRestantes !== null && diasRestantes >= 0 && diasRestantes <= 30;
                      const rowBg = vencido ? "#fff5f5" : urgente ? "#fffbeb" : idx%2===0 ? "#fff" : "#fafafa";
                      const formatValidade = (v) => v || "—";
                      return (
                        <tr key={l.id} style={{ borderBottom: "1px solid #f3f4f6", background: rowBg }}>
                          <td style={{ ...TD, textAlign: "left", fontWeight: 600 }}>{p?.nome || l.produtoId}</td>
                          <td style={{ ...TD, fontFamily: "monospace", fontSize: 12 }}>{l.lote}</td>
                          <td style={{ ...TD, fontWeight: 600 }}>{formatValidade(l.validade)}</td>
                          <td style={TD}>
                            {diasRestantes === null ? <span style={{ color: "#9ca3af" }}>—</span>
                            : vencido ? <span style={{ background: "#fee2e2", color: "#991b1b", padding: "2px 8px", borderRadius: 12, fontSize: 11, fontWeight: 700 }}>VENCIDO há {Math.abs(diasRestantes)}d</span>
                            : urgente ? <span style={{ background: "#fef3c7", color: "#92400e", padding: "2px 8px", borderRadius: 12, fontSize: 11, fontWeight: 700 }}>{diasRestantes} dias</span>
                            : <span style={{ color: "#166534", fontWeight: 600 }}>{diasRestantes} dias</span>}
                          </td>
                          <td style={{ ...TD, fontWeight: 700 }}>{l.qtd} {p?.unidade}</td>
                          <td style={TD}>{l.responsavel}</td>
                          <td style={{ ...TD, color: "#6b7280", fontSize: 11 }}>{formatDate(l.ts)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
          );
        })()}

        {/* ============================== ABA CONSUMO ============================== */}
        {activeTab === "consumo" && (
          <ConsumoTab
            movimentacoes={movimentacoes}
            produtoById={produtoById}
            consumoDe={consumoDe} setConsumoDe={setConsumoDe}
            consumoAte={consumoAte} setConsumoAte={setConsumoAte}
          />
        )}

      </div>{/* end main */}

      {/* ============================================================ */}
      {/* MODAL BAIXA */}
      {/* ============================================================ */}
      {modalBaixa && (() => {
        const hoje = new Date(); hoje.setHours(0,0,0,0);
        const parseVal = (v) => {
          if (!v) return null;
          const p = v.split("/"); if (p.length!==3) return null;
          let yr = parseInt(p[2]); if (isNaN(yr)) return null;
          if (yr < 100) yr = 2000 + yr;
          const d = new Date(yr, parseInt(p[1])-1, parseInt(p[0]));
          return isNaN(d.getTime()) ? null : d;
        };
        const lotesDoP = lotesRegistrados
          .filter(l => l.produtoId === modalBaixa.id && (parseFloat(l.qtd) || 0) > 0)
          .sort((a, b) => {
            // Sort by expiry ascending (use first to expire first — FEFO)
            const da = parseVal(a.validade), db = parseVal(b.validade);
            if (da && db) return da - db;
            if (da) return -1; if (db) return 1;
            return 0;
          });
        const temLotes = lotesDoP.length > 0;
        const loteSel = baixaLoteId ? lotesDoP.find(l => l.id === baixaLoteId) : null;
        const qtdDisponivel = loteSel ? (parseFloat(loteSel.qtd) || 0) : (estoques[modalBaixa.id] ?? 0);
        return (
        <Modal onClose={() => { setModalBaixa(null); setBaixaLoteId(null); }} titulo={`↓ Dar Baixa — ${modalBaixa.nome}`}>
          {/* Estoque total */}
          <div style={{ display: "flex", gap: 12, marginBottom: 14, flexWrap: "wrap" }}>
            <div style={{ background: "#f9fafb", border: "1px solid #e5e7eb", borderRadius: 8, padding: "8px 14px", flex: 1 }}>
              <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 700, textTransform: "uppercase", marginBottom: 2 }}>Estoque total</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: "#1a4f3a" }}>{estoques[modalBaixa.id] ?? 0} <span style={{ fontSize: 12 }}>{modalBaixa.unidade}</span></div>
            </div>
            {loteSel && (
              <div style={{ background: "#eff6ff", border: "1px solid #bfdbfe", borderRadius: 8, padding: "8px 14px", flex: 1 }}>
                <div style={{ fontSize: 11, color: "#1d4ed8", fontWeight: 700, textTransform: "uppercase", marginBottom: 2 }}>Lote selecionado</div>
                <div style={{ fontSize: 18, fontWeight: 800, color: "#1d4ed8" }}>{qtdDisponivel} <span style={{ fontSize: 12 }}>{modalBaixa.unidade}</span></div>
              </div>
            )}
          </div>

          {/* Seletor de lote */}
          {temLotes && (
            <div style={{ marginBottom: 14 }}>
              <Label>Lote para dar baixa</Label>
              <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 4 }}>
                <div
                  onClick={() => setBaixaLoteId(null)}
                  style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: 8,
                    border: `2px solid ${!baixaLoteId ? "#1a4f3a" : "#e5e7eb"}`,
                    background: !baixaLoteId ? "#f0fdf4" : "#fff", cursor: "pointer" }}>
                  <div style={{ width: 16, height: 16, borderRadius: "50%", border: `2px solid ${!baixaLoteId ? "#1a4f3a" : "#d1d5db"}`,
                    background: !baixaLoteId ? "#1a4f3a" : "#fff", flexShrink: 0 }} />
                  <div style={{ fontSize: 13 }}>
                    <span style={{ fontWeight: 600 }}>Sem especificar lote</span>
                    <span style={{ color: "#6b7280", marginLeft: 6, fontSize: 12 }}>desconta do total geral</span>
                  </div>
                </div>
                {lotesDoP.map(l => {
                  const dVal = parseVal(l.validade);
                  const dias = dVal ? Math.ceil((dVal - hoje) / 86400000) : null;
                  const vencido = dias !== null && dias < 0;
                  const proximo = dias !== null && dias >= 0 && dias <= 30;
                  const sel = baixaLoteId === l.id;
                  return (
                    <div key={l.id}
                      onClick={() => { setBaixaLoteId(l.id); setBaixaQtd(""); }}
                      style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: 8,
                        border: `2px solid ${sel ? "#1d4ed8" : vencido ? "#fca5a5" : "#e5e7eb"}`,
                        background: sel ? "#eff6ff" : vencido ? "#fff5f5" : "#fff", cursor: "pointer" }}>
                      <div style={{ width: 16, height: 16, borderRadius: "50%", border: `2px solid ${sel ? "#1d4ed8" : "#d1d5db"}`,
                        background: sel ? "#1d4ed8" : "#fff", flexShrink: 0 }} />
                      <div style={{ flex: 1, fontSize: 13 }}>
                        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                          <span style={{ fontWeight: 700 }}>Lote {l.lote || "s/nº"}</span>
                          <span style={{ background: "#e0f2fe", color: "#0369a1", padding: "1px 7px", borderRadius: 10, fontSize: 11, fontWeight: 700 }}>
                            {parseFloat(l.qtd) || 0} {modalBaixa.unidade}
                          </span>
                          {l.validade && (
                            <span style={{ fontSize: 11, color: vencido ? "#dc2626" : proximo ? "#d97706" : "#6b7280", fontWeight: vencido||proximo ? 700 : 400 }}>
                              Val: {l.validade}
                              {dias !== null && (vencido ? " ⚠ VENCIDO" : proximo ? ` (${dias}d)` : "")}
                            </span>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          <Label>Quantidade a dar baixa ({modalBaixa.unidade})</Label>
          <input autoFocus type="number" min="0"
            max={loteSel ? qtdDisponivel : undefined}
            value={baixaQtd} onChange={e => setBaixaQtd(e.target.value)}
            style={{ ...INPUT, borderColor: loteSel && parseFloat(baixaQtd) > qtdDisponivel ? "#dc2626" : undefined }}
            placeholder={loteSel ? `máx ${qtdDisponivel} ${modalBaixa.unidade}` : `ex: 1 ${modalBaixa.unidade}`} />
          {loteSel && parseFloat(baixaQtd) > qtdDisponivel && (
            <div style={{ color: "#dc2626", fontSize: 12, marginTop: 4 }}>
              ⚠ Quantidade maior que o disponível no lote ({qtdDisponivel} {modalBaixa.unidade})
            </div>
          )}

          <Label>Responsável *</Label>
          <input type="text" value={baixaResp} onChange={e => setBaixaResp(e.target.value)} style={INPUT} />
          <Label>Observação (opcional)</Label>
          <input type="text" value={baixaObs} onChange={e => setBaixaObs(e.target.value)} style={INPUT} placeholder="ex: levado para o C.C." />

          <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
            <button onClick={confirmarBaixa}
              disabled={!baixaQtd || !baixaResp.trim() || (loteSel && parseFloat(baixaQtd) > qtdDisponivel)}
              style={{ ...btnStyle("#dc2626","#fff"), flex: 1, opacity: (!baixaQtd||!baixaResp.trim())||(loteSel&&parseFloat(baixaQtd)>qtdDisponivel)?0.5:1 }}>

            </button>
            <button onClick={() => { setModalBaixa(null); setBaixaLoteId(null); }} style={{ ...btnStyle("#f3f4f6","#374151"), flex: 1 }}>Cancelar</button>
          </div>
        </Modal>
        );
      })()}

      {/* ============================================================ */}
      {/* MODAL ENTRADA */}
      {/* ============================================================ */}
      {modalEntrada && (
        <Modal onClose={() => setModalEntrada(null)} titulo={`↑ Registrar Entrada — ${modalEntrada.nome}`} wide>

            <div style={{ fontSize: 13, color: "#6b7280" }}>
              Estoque atual: <strong style={{ color: "#1a1a1a" }}>{estoques[modalEntrada.id]} {modalEntrada.unidade}</strong>
            </div>
            <div style={{ fontSize: 13, color: "#166534", fontWeight: 700 }}>
              Total a entrar: {totalEntrada} {modalEntrada.unidade}
            </div>
          </div>

          {/* Lotes */}
          <div style={{ border: "1.5px solid #e5e7eb", borderRadius: 8, overflow: "hidden", marginBottom: 12 }}>

              <span style={{ fontSize: 12, fontWeight: 700, color: "#166534" }}>📦 Lotes recebidos</span>
              <button onClick={addLote} style={{ ...btnSmall, background: "#166534", color: "#fff" }}>+ Adicionar lote</button>
            </div>
            <div style={{ padding: "10px 12px", display: "flex", flexDirection: "column", gap: 10 }}>
              {entradaLotes.map((l, i) => (
                <div key={i} style={{ display: "flex", gap: 8, alignItems: "center", background: "#fafafa", borderRadius: 7, padding: "8px 10px", border: "1px solid #e5e7eb" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: "#6b7280", marginBottom: 3 }}>LOTE {i+1}</div>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      <div style={{ flex: 1, minWidth: 100 }}>
                        <div style={{ fontSize: 10, color: "#9ca3af", marginBottom: 2 }}>Nº do lote</div>
                        <input type="text" value={l.lote} onChange={e => updateLote(i, "lote", e.target.value)}
                          style={{ ...INPUT, padding: "5px 8px", fontSize: 12 }} placeholder="ex: L2024A" />
                      </div>
                      <div style={{ flex: 1, minWidth: 120 }}>
                        <div style={{ fontSize: 10, color: "#9ca3af", marginBottom: 2 }}>Validade (DD/MM/AAAA)</div>
                        <input type="text" value={l.validade}
                          onChange={e => {
                            updateLote(i, "validade", maskData(e.target.value));
                          }}
                          style={{ ...INPUT, padding: "5px 8px", fontSize: 12 }} placeholder="DD/MM/AAAA" maxLength={10} />
                      </div>
                      <div style={{ width: 90 }}>
                        <div style={{ fontSize: 10, color: "#9ca3af", marginBottom: 2 }}>Qtd ({modalEntrada.unidade})</div>
                        <input type="number" min="0" value={l.qtd} onChange={e => updateLote(i, "qtd", e.target.value)}
                          style={{ ...INPUT, padding: "5px 8px", fontSize: 12 }} placeholder="0" />
                      </div>
                    </div>
                  </div>
                  {entradaLotes.length > 1 && (
                    <button onClick={() => removeLote(i)} style={{ background: "none", border: "none", cursor: "pointer", color: "#dc2626", fontSize: 18, lineHeight: 1, padding: "0 4px" }}>✕</button>
                  )}
                </div>
              ))}
            </div>
          </div>

          <Label>Responsável pelo recebimento *</Label>
          <input type="text" value={entradaResp} onChange={e => setEntradaResp(e.target.value)} style={INPUT}  />

          <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
            <button onClick={confirmarEntrada} disabled={!totalEntrada || !entradaResp.trim()}
              style={{ ...btnStyle("#166634","#fff"), flex: 1, opacity: (!totalEntrada||!entradaResp.trim())?0.5:1, background: "#166534" }}>
              ↑ Confirmar Entrada ({totalEntrada} {modalEntrada.unidade})
            </button>
            <button onClick={() => setModalEntrada(null)} style={{ ...btnStyle("#f3f4f6","#374151"), flex: 1 }}>Cancelar</button>
          </div>
        </Modal>
      )}

      {/* ============================================================ */}
      {/* MODAL NOVO PRODUTO */}
      {/* ============================================================ */}
      {showNovoProduto && (
        <Modal onClose={() => setShowNovoProduto(false)} titulo="➕ Adicionar Novo Produto">
          <Label>Tabela *</Label>
          <select value={novoProduto.tabela} onChange={e => setNovoProduto(p => ({...p, tabela: e.target.value}))}
            style={{ ...INPUT, background: "#fff" }}>
            <option value="clinicos">🩺 Clínicos / Cirúrgicos</option>
            <option value="controlados">🔒 Controlados</option>
            <option value="injetaveis">💉 Injetáveis / Vacinas</option>
          </select>
          <Label>Grupo / Categoria *</Label>
          <input type="text" value={novoProduto.grupo} onChange={e => setNovoProduto(p => ({...p, grupo: e.target.value}))}
            style={INPUT} placeholder="ex: Fio de Nylon, Soro e Ringer..." />
          <Label>Nome do produto *</Label>
          <input type="text" value={novoProduto.nome} onChange={e => setNovoProduto(p => ({...p, nome: e.target.value}))}
            style={INPUT} placeholder="ex: Fio nylon 6-0 agulha 1,5cm cx c/24un" />
          <div style={{ display: "flex", gap: 10 }}>
            <div style={{ flex: 1 }}>
              <Label>Unidade</Label>
              <select value={novoProduto.unidade} onChange={e => setNovoProduto(p => ({...p, unidade: e.target.value}))}
                style={{ ...INPUT, background: "#fff" }}>
                {["un","cx","pct","fr","amp","ml","L","g","kg"].map(u => <option key={u}>{u}</option>)}
              </select>
            </div>
            <div style={{ flex: 1 }}>
              <Label>Estoque mínimo</Label>
              <input type="number" min="0" value={novoProduto.min} onChange={e => setNovoProduto(p => ({...p, min: e.target.value}))}
                style={INPUT} placeholder="—" />
            </div>
            <div style={{ flex: 1 }}>
              <Label>Estoque máximo</Label>
              <input type="number" min="0" value={novoProduto.max} onChange={e => setNovoProduto(p => ({...p, max: e.target.value}))}
                style={INPUT} placeholder="—" />
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
            <button onClick={adicionarProduto} disabled={!novoProduto.nome.trim() || !novoProduto.grupo.trim()}
              style={{ ...btnStyle("#1a4f3a","#fff"), flex: 1, opacity: (!novoProduto.nome.trim()||!novoProduto.grupo.trim())?0.5:1 }}>
              ➕ Adicionar Produto
            </button>
            <button onClick={() => setShowNovoProduto(false)} style={{ ...btnStyle("#f3f4f6","#374151"), flex: 1 }}>Cancelar</button>
          </div>
        </Modal>
      )}

      {/* ============================================================ */}
      {/* MODAL BACKUP */}
      {/* ============================================================ */}
      {showBackupModal && (
        <Modal onClose={() => { setShowBackupModal(false); setImportError(""); }} titulo="💾 Backup de Dados">
          <p style={{ fontSize: 13, color: "#6b7280", marginBottom: 20, lineHeight: 1.6 }}>
            Os dados são salvos automaticamente neste dispositivo (tablet/computador). Use as opções abaixo para fazer backup externo ou restaurar dados em um novo dispositivo.
          </p>

          {/* Auto-save status */}
          <div style={{ background: "#f0fdf4", border: "1px solid #86efac", borderRadius: 8, padding: "10px 14px", marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 18 }}>✅</span>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#166534" }}>Salvamento automático ativo</div>
              <div style={{ fontSize: 11, color: "#6b7280" }}>Todas as alterações são salvas automaticamente neste dispositivo.</div>
            </div>
          </div>

          {/* Export */}
          <div style={{ border: "1.5px solid #e5e7eb", borderRadius: 8, padding: "14px", marginBottom: 12 }}>
            <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>📤 Exportar backup</div>
            <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 10 }}>
              Salva todos os dados em um arquivo <strong>.json</strong> que você pode guardar no Google Drive, e-mail ou pen drive.
            </div>
            <div style={{ fontSize: 11, color: "#6b7280", marginBottom: 10 }}>
              Contém: {movimentacoes.length} movimentações · {lotesRegistrados.length} lotes · {conferencias.length} conferências · {pedidos.length} pedidos
            </div>
            <button onClick={exportarDados} style={{ ...btnStyle("#1a4f3a","#fff"), width: "100%" }}>
              ⬇️ Baixar backup agora
            </button>
          </div>

          {/* Import */}
          <div style={{ border: "1.5px solid #e5e7eb", borderRadius: 8, padding: "14px" }}>
            <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 6 }}>📥 Importar backup</div>
            <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 10 }}>
              Restaura os dados de um arquivo de backup. Use ao trocar de dispositivo ou após uma atualização do sistema.
            </div>
            {importError && (
              <div style={{ background: "#fee2e2", color: "#991b1b", borderRadius: 6, padding: "6px 10px", fontSize: 12, marginBottom: 8 }}>
                ⚠️ {importError}
              </div>
            )}
            <label style={{ ...btnStyle("#334155","#e2e8f0"), display: "block", textAlign: "center", cursor: "pointer", padding: "8px 16px", borderRadius: 8 }}>
              📂 Selecionar arquivo de backup
              <input type="file" accept=".json" onChange={importarDados} style={{ display: "none" }} />
            </label>
          </div>
        </Modal>
      )}

      {/* ============================================================ */}
      {/* MODAL SALVAR CONFERÊNCIA */}
      {/* ============================================================ */}
      {showConfModal && (

          <input type="text" value={confObs} onChange={e => setConfObs(e.target.value)} style={INPUT} placeholder="ex: Conferência de rotina semanal" />
          <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
            <button onClick={salvarConferencia} disabled={!confResp.trim()}

            </button>
            <button onClick={() => setShowConfModal(false)} style={{ ...btnStyle("#f3f4f6","#374151"), flex: 1 }}>Voltar</button>

      {/* MODAL PEDIDO */}

      {showPedidoModal && (

              <div style={{ maxHeight: 300, overflowY: "auto", marginBottom: 14 }}>

              <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
                <button onClick={gerarPedido} disabled={!pedidoResp.trim()}
                  style={{ ...btnStyle("#f59e0b","#78350f"), flex: 1, opacity: !pedidoResp.trim()?0.5:1 }}>
                  🛒 Gerar Pedido ({itensFaltando.length} itens)
                </button>
                <button onClick={() => setShowPedidoModal(false)} style={{ ...btnStyle("#f3f4f6","#374151"), flex: 1 }}>Cancelar</button>
              </div>
            </>
          )}
        </Modal>
      )}

    </div>
  );
}

// BUSCA RESULTADOS COMPONENT
// ============================================================
function BuscaResultados({ termo, todosProdutos, estoques, minMax, lotesRegistrados, getStatus, gMin, gMax,
  setModalBaixa, setBaixaQtd, setBaixaObs, setModalEntrada, setEntradaLotes, produtoExpandido, setProdutoExpandido }) {

  const parseVal = (v) => {
    if (!v) return null;
    const parts = v.split("/");
    if (parts.length !== 3 || parts[2].length !== 4) return null;
    const d = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
    return isNaN(d.getTime()) ? null : d;
  };

  const resultados = todosProdutos.filter(p =>
    p.nome.toLowerCase().includes(termo.toLowerCase()) ||
    (p.codigo && p.codigo.toLowerCase().includes(termo.toLowerCase())) ||
    p.grupo.toLowerCase().includes(termo.toLowerCase())
  );

  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
        <span style={{ fontWeight: 700, fontSize: 15, color: "#1a4f3a" }}>
          Resultados para "{termo}"
        </span>
        <span style={{ background: "#e0f2fe", color: "#0369a1", padding: "2px 10px", borderRadius: 20, fontSize: 12, fontWeight: 700 }}>
          {resultados.length} {resultados.length === 1 ? "item" : "itens"}
        </span>
      </div>
      {resultados.length === 0 ? (
        <div style={{ background: "#fff", borderRadius: 10, padding: "32px", textAlign: "center", color: "#9ca3af" }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>🔍</div>
          <div style={{ fontWeight: 600 }}>Nenhum produto encontrado</div>
          <div style={{ fontSize: 12, marginTop: 4 }}>Tente outro nome ou código</div>
        </div>
      ) : (
        <div style={{ background: "#fff", borderRadius: 10, overflow: "hidden", boxShadow: "0 1px 3px rgba(0,0,0,.07)" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ background: "#f9fafb", borderBottom: "1px solid #e5e7eb" }}>
                <th style={{ ...TH, textAlign: "left", minWidth: 220 }}>Produto</th>
                <th style={TH}>Tabela / Grupo</th>
                <th style={{ ...TH, background: "#eff6ff", color: "#1d4ed8" }}>Estoque</th>
                <th style={TH}>Mín</th>
                <th style={TH}>Máx</th>
                <th style={TH}>Status</th>
                <th style={TH}>Último lote / Validade</th>
                <th style={TH}>Ações</th>
              </tr>
            </thead>
            <tbody>
              {resultados.map((p, idx) => {
                const qt = estoques[p.id] ?? 0;
                const st = getStatus(p);
                const lotesP = [...lotesRegistrados]
                  .filter(l => l.produtoId === p.id)
                  .sort((a, b) => new Date(b.ts) - new Date(a.ts));
                const ultimoLote = lotesP[0];
                const hoje = new Date(); hoje.setHours(0,0,0,0);
                const dVal = ultimoLote ? parseVal(ultimoLote.validade) : null;
                const diasVal = dVal ? Math.ceil((dVal - hoje) / 86400000) : null;
                const expandido = produtoExpandido === p.id;
                return (
                  <React.Fragment key={p.id}>
                    <tr onClick={() => setProdutoExpandido(expandido ? null : p.id)}
                      style={{ borderBottom: "1px solid #f3f4f6", background: expandido ? "#f0fdf4" : idx%2===0?"#fff":"#fafafa", cursor: "pointer" }}>
                      <td style={{ ...TD, textAlign: "left" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ fontSize: 12, color: "#9ca3af" }}>{expandido ? "▾" : "▸"}</span>
                          <div>
                            <div style={{ fontWeight: 600 }}>{p.nome}</div>
                            {p.codigo && <div style={{ fontSize: 10, color: "#9ca3af" }}>#{p.codigo}</div>}
                          </div>
                        </div>
                      </td>
                      <td style={{ ...TD, fontSize: 11 }}>
                        <div style={{ color: "#6b7280" }}>{p.tabela}</div>
                        <div style={{ color: "#9ca3af" }}>{p.grupo}</div>
                      </td>
                      <td style={{ ...TD }}>
                        <span style={{ fontWeight: 800, fontSize: 15, color: st.tipo==="zerado"?"#dc2626":st.tipo==="baixo"?"#d97706":"#1a4f3a" }}>
                          {qt}
                        </span>
                        <span style={{ fontSize: 10, color: "#9ca3af", marginLeft: 3 }}>{p.unidade}</span>
                      </td>
                      <td style={{ ...TD, color: "#6b7280" }}>{gMin(p) ?? "—"}</td>
                      <td style={{ ...TD, color: "#6b7280" }}>{gMax(p) ?? "—"}</td>
                      <td style={TD}>
                        <span style={{ background: st.cor, color: st.corT, padding: "2px 8px", borderRadius: 12, fontSize: 11, fontWeight: 700, whiteSpace: "nowrap" }}>
                          {st.label}
                        </span>
                      </td>
                      <td style={TD}>
                        {ultimoLote ? (
                          <div>
                            <div style={{ fontSize: 11, fontWeight: 600 }}>{ultimoLote.validade || "s/ validade"}</div>
                            {diasVal !== null && (
                              <div style={{ fontSize: 10, color: diasVal < 0 ? "#dc2626" : diasVal <= 30 ? "#d97706" : "#6b7280" }}>
                                {diasVal < 0 ? `Vencido há ${Math.abs(diasVal)}d` : `${diasVal} dias`}
                              </div>
                            )}
                          </div>
                        ) : <span style={{ color: "#9ca3af", fontSize: 11 }}>—</span>}
                      </td>
                      <td style={{ ...TD, whiteSpace: "nowrap" }}>
                        <button onClick={e => { e.stopPropagation(); setModalBaixa(p); setBaixaQtd(""); setBaixaObs(""); }}
                          style={{ ...btnSmall, background: "#fee2e2", color: "#991b1b", marginRight: 5 }}>↓ Baixa</button>
                        <button onClick={e => { e.stopPropagation(); setModalEntrada(p); setEntradaLotes([{ lote: "", validade: "", qtd: "" }]); }}
                          style={{ ...btnSmall, background: "#dcfce7", color: "#166534" }}>↑ Entrada</button>
                      </td>
                    </tr>
                    {expandido && (
                      <tr style={{ background: "#f0fdf4" }}>
                        <td colSpan={8} style={{ padding: "0 16px 16px 16px" }}>
                          <div style={{ display: "flex", gap: 20, flexWrap: "wrap", paddingTop: 12 }}>
                            <div style={{ background: "#fff", borderRadius: 8, padding: "12px 16px", border: "1px solid #86efac", minWidth: 160 }}>
                              <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>Estoque atual</div>
                              <div style={{ fontSize: 24, fontWeight: 800, color: st.tipo==="zerado"?"#dc2626":st.tipo==="baixo"?"#d97706":"#1a4f3a" }}>{qt} <span style={{ fontSize: 13 }}>{p.unidade}</span></div>
                              <div style={{ fontSize: 11, marginTop: 2 }}>Mín: {gMin(p)??"-"} · Máx: {gMax(p)??"-"}</div>
                            </div>
                            <div style={{ background: "#fff", borderRadius: 8, padding: "12px 16px", border: "1px solid #e5e7eb", flex: 1, minWidth: 200 }}>
                              <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>Lotes registrados ({lotesP.length})</div>
                              {lotesP.length === 0
                                ? <span style={{ fontSize: 12, color: "#9ca3af" }}>Nenhum lote registrado</span>
                                : lotesP.slice(0,3).map((l,i) => {
                                    const dL = parseVal(l.validade);
                                    const dR = dL ? Math.ceil((dL - hoje)/86400000) : null;
                                    return (
                                      <div key={i} style={{ fontSize: 12, marginBottom: 4, display: "flex", gap: 8 }}>
                                        <span style={{ fontWeight: 600 }}>Lote {l.lote}</span>
                                        <span style={{ color: "#6b7280" }}>Val: {l.validade||"—"}</span>
                                        {dR !== null && <span style={{ color: dR<0?"#dc2626":dR<=30?"#d97706":"#166534", fontWeight: 700 }}>{dR<0?`Vencido`:dR+"d"}</span>}
                                        <span style={{ color: "#9ca3af" }}>{l.qtd} {p.unidade}</span>
                                      </div>
                                    );
                                  })}
                            </div>
                            <div style={{ display: "flex", flexDirection: "column", gap: 8, justifyContent: "center" }}>
                              <button onClick={() => { setModalBaixa(p); setBaixaQtd(""); setBaixaObs(""); }}
                                style={{ ...btnStyle("#dc2626","#fff"), fontSize: 13 }}>↓ Dar Baixa</button>
                              <button onClick={() => { setModalEntrada(p); setEntradaLotes([{ lote: "", validade: "", qtd: "" }]); }}
                                style={{ ...btnStyle("#166534","#fff"), fontSize: 13 }}>↑ Registrar Entrada</button>
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}
