function Modal({ children, onClose, titulo, wide }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.5)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}
      onClick={onClose}>
      <div style={{ background: "#fff", borderRadius: 14, padding: "20px 24px", width: "100%", maxWidth: wide ? 700 : 420, boxShadow: "0 20px 60px rgba(0,0,0,.25)", maxHeight: "90vh", overflowY: "auto" }}
        onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
          <div style={{ fontWeight: 800, fontSize: 16 }}>{titulo}</div>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#9ca3af", lineHeight: 1 }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function EmptyState({ icon, msg, sub }) {
  return (
    <div style={{ background: "#fff", borderRadius: 10, padding: "48px 24px", textAlign: "center", boxShadow: "0 1px 3px rgba(0,0,0,.07)" }}>
      <div style={{ fontSize: 48, marginBottom: 12 }}>{icon}</div>
      <div style={{ fontWeight: 700, fontSize: 16, color: "#374151" }}>{msg}</div>
      <div style={{ fontSize: 13, color: "#9ca3af", marginTop: 6 }}>{sub}</div>
    </div>
  );
}

function Label({ children }) {
  return <div style={{ fontSize: 12, fontWeight: 700, color: "#374151", marginBottom: 4, marginTop: 12 }}>{children}</div>;
}

// ============================================================
// BUSCA RESULTADOS COMPONENT
// ============================================================
function BuscaResultados({ termo, todosProdutos, estoques, minMax, lotesRegistrados, getStatus, gMin, gMax,
  setModalBaixa, setBaixaQtd, setBaixaObs, setModalEntrada, setEntradaLotes, produtoExpandido, setProdutoExpandido }) {

  const parseVal = (v) => {
    if (!v) return null;
    const parts = v.split("/");
    if (parts.length !== 3 || parts[2].length !== 4) return null;
    const d = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
    return isNaN(d.getTime()) ? null : d;
  };

  const resultados = todosProdutos.filter(p =>
    p.nome.toLowerCase().includes(termo.toLowerCase()) ||
    (p.codigo && p.codigo.toLowerCase().includes(termo.toLowerCase())) ||
    p.grupo.toLowerCase().includes(termo.toLowerCase())
  );

  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
        <span style={{ fontWeight: 700, fontSize: 15, color: "#1a4f3a" }}>
          Resultados para "{termo}"
        </span>
        <span style={{ background: "#e0f2fe", color: "#0369a1", padding: "2px 10px", borderRadius: 20, fontSize: 12, fontWeight: 700 }}>
          {resultados.length} {resultados.length === 1 ? "item" : "itens"}
        </span>
      </div>
      {resultados.length === 0 ? (
        <div style={{ background: "#fff", borderRadius: 10, padding: "32px", textAlign: "center", color: "#9ca3af" }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>🔍</div>
          <div style={{ fontWeight: 600 }}>Nenhum produto encontrado</div>
          <div style={{ fontSize: 12, marginTop: 4 }}>Tente outro nome ou código</div>
        </div>
      ) : (
        <div style={{ background: "#fff", borderRadius: 10, overflow: "hidden", boxShadow: "0 1px 3px rgba(0,0,0,.07)" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ background: "#f9fafb", borderBottom: "1px solid #e5e7eb" }}>
                <th style={{ ...TH, textAlign: "left", minWidth: 220 }}>Produto</th>
                <th style={TH}>Tabela / Grupo</th>
                <th style={{ ...TH, background: "#eff6ff", color: "#1d4ed8" }}>Estoque</th>
                <th style={TH}>Mín</th>
                <th style={TH}>Máx</th>
                <th style={TH}>Status</th>
                <th style={TH}>Último lote / Validade</th>
                <th style={TH}>Ações</th>
              </tr>
            </thead>
            <tbody>
              {resultados.map((p, idx) => {
                const qt = estoques[p.id] ?? 0;
                const st = getStatus(p);
                const lotesP = [...lotesRegistrados]
                  .filter(l => l.produtoId === p.id)
                  .sort((a, b) => new Date(b.ts) - new Date(a.ts));
                const ultimoLote = lotesP[0];
                const hoje = new Date(); hoje.setHours(0,0,0,0);
                const dVal = ultimoLote ? parseVal(ultimoLote.validade) : null;
                const diasVal = dVal ? Math.ceil((dVal - hoje) / 86400000) : null;
                const expandido = produtoExpandido === p.id;
                return (
                  <React.Fragment key={p.id}>
                    <tr onClick={() => setProdutoExpandido(expandido ? null : p.id)}
                      style={{ borderBottom: "1px solid #f3f4f6", background: expandido ? "#f0fdf4" : idx%2===0?"#fff":"#fafafa", cursor: "pointer" }}>
                      <td style={{ ...TD, textAlign: "left" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ fontSize: 12, color: "#9ca3af" }}>{expandido ? "▾" : "▸"}</span>
                          <div>
                            <div style={{ fontWeight: 600 }}>{p.nome}</div>
                            {p.codigo && <div style={{ fontSize: 10, color: "#9ca3af" }}>#{p.codigo}</div>}
                          </div>
                        </div>
                      </td>
                      <td style={{ ...TD, fontSize: 11 }}>
                        <div style={{ color: "#6b7280" }}>{p.tabela}</div>
                        <div style={{ color: "#9ca3af" }}>{p.grupo}</div>
                      </td>
                      <td style={{ ...TD }}>
                        <span style={{ fontWeight: 800, fontSize: 15, color: st.tipo==="zerado"?"#dc2626":st.tipo==="baixo"?"#d97706":"#1a4f3a" }}>
                          {qt}
                        </span>
                        <span style={{ fontSize: 10, color: "#9ca3af", marginLeft: 3 }}>{p.unidade}</span>
                      </td>
                      <td style={{ ...TD, color: "#6b7280" }}>{gMin(p) ?? "—"}</td>
                      <td style={{ ...TD, color: "#6b7280" }}>{gMax(p) ?? "—"}</td>
                      <td style={TD}>
                        <span style={{ background: st.cor, color: st.corT, padding: "2px 8px", borderRadius: 12, fontSize: 11, fontWeight: 700, whiteSpace: "nowrap" }}>
                          {st.label}
                        </span>
                      </td>
                      <td style={TD}>
                        {ultimoLote ? (
                          <div>
                            <div style={{ fontSize: 11, fontWeight: 600 }}>{ultimoLote.validade || "s/ validade"}</div>
                            {diasVal !== null && (
                              <div style={{ fontSize: 10, color: diasVal < 0 ? "#dc2626" : diasVal <= 30 ? "#d97706" : "#6b7280" }}>
                                {diasVal < 0 ? `Vencido há ${Math.abs(diasVal)}d` : `${diasVal} dias`}
                              </div>
                            )}
                          </div>
                        ) : <span style={{ color: "#9ca3af", fontSize: 11 }}>—</span>}
                      </td>
                      <td style={{ ...TD, whiteSpace: "nowrap" }}>
                        <button onClick={e => { e.stopPropagation(); setModalBaixa(p); setBaixaQtd(""); setBaixaObs(""); }}
                          style={{ ...btnSmall, background: "#fee2e2", color: "#991b1b", marginRight: 5 }}>↓ Baixa</button>
                        <button onClick={e => { e.stopPropagation(); setModalEntrada(p); setEntradaLotes([{ lote: "", validade: "", qtd: "" }]); }}
                          style={{ ...btnSmall, background: "#dcfce7", color: "#166534" }}>↑ Entrada</button>
                      </td>
                    </tr>
                    {expandido && (
                      <tr style={{ background: "#f0fdf4" }}>
                        <td colSpan={8} style={{ padding: "0 16px 16px 16px" }}>
                          <div style={{ display: "flex", gap: 20, flexWrap: "wrap", paddingTop: 12 }}>
                            <div style={{ background: "#fff", borderRadius: 8, padding: "12px 16px", border: "1px solid #86efac", minWidth: 160 }}>
                              <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>Estoque atual</div>
                              <div style={{ fontSize: 24, fontWeight: 800, color: st.tipo==="zerado"?"#dc2626":st.tipo==="baixo"?"#d97706":"#1a4f3a" }}>{qt} <span style={{ fontSize: 13 }}>{p.unidade}</span></div>
                              <div style={{ fontSize: 11, marginTop: 2 }}>Mín: {gMin(p)??"-"} · Máx: {gMax(p)??"-"}</div>
                            </div>
                            <div style={{ background: "#fff", borderRadius: 8, padding: "12px 16px", border: "1px solid #e5e7eb", flex: 1, minWidth: 200 }}>
                              <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>Lotes registrados ({lotesP.length})</div>
                              {lotesP.length === 0
                                ? <span style={{ fontSize: 12, color: "#9ca3af" }}>Nenhum lote registrado</span>
                                : lotesP.slice(0,3).map((l,i) => {
                                    const dL = parseVal(l.validade);
                                    const dR = dL ? Math.ceil((dL - hoje)/86400000) : null;
                                    return (
                                      <div key={i} style={{ fontSize: 12, marginBottom: 4, display: "flex", gap: 8 }}>
                                        <span style={{ fontWeight: 600 }}>Lote {l.lote}</span>
                                        <span style={{ color: "#6b7280" }}>Val: {l.validade||"—"}</span>
                                        {dR !== null && <span style={{ color: dR<0?"#dc2626":dR<=30?"#d97706":"#166534", fontWeight: 700 }}>{dR<0?`Vencido`:dR+"d"}</span>}
                                        <span style={{ color: "#9ca3af" }}>{l.qtd} {p.unidade}</span>
                                      </div>
                                    );
                                  })}
                            </div>
                            <div style={{ display: "flex", flexDirection: "column", gap: 8, justifyContent: "center" }}>
                              <button onClick={() => { setModalBaixa(p); setBaixaQtd(""); setBaixaObs(""); }}
                                style={{ ...btnStyle("#dc2626","#fff"), fontSize: 13 }}>↓ Dar Baixa</button>
                              <button onClick={() => { setModalEntrada(p); setEntradaLotes([{ lote: "", validade: "", qtd: "" }]); }}
                                style={{ ...btnStyle("#166534","#fff"), fontSize: 13 }}>↑ Registrar Entrada</button>
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}


// ============================================================
// CONSUMO TAB COMPONENT
// ============================================================
function ConsumoTab({ movimentacoes, produtoById, consumoDe, setConsumoDe, consumoAte, setConsumoAte }) {
  const parseDataBR = (v) => {
    if (!v) return null;
    var p = v.split("/");
    if (p.length !== 3) return null;
    var yr = parseInt(p[2]);
    if (isNaN(yr)) return null;
    if (yr < 100) yr = 2000 + yr;
    var d = new Date(yr, parseInt(p[1])-1, parseInt(p[0]));
    return isNaN(d.getTime()) ? null : d;
  };

const maskData = (rawValue) => {
    // Strip everything except digits
    const digits = rawValue.replace(/\D/g, "").slice(0, 8);
    const d = digits;
    if (d.length <= 2) return d;
    if (d.length <= 4) return d.slice(0,2) + "/" + d.slice(2);
    let ano = d.slice(4, 8);
    // Auto-expand 2-digit year: "26" → "2026"
    if (ano.length === 2 && parseInt(ano) < 100) ano = "20" + ano;
    return d.slice(0,2) + "/" + d.slice(2,4) + "/" + ano;
  };;

  const hoje = new Date(); hoje.setHours(0,0,0,0);

  // Default range: last 30 days if empty
  const dDe  = parseDataBR(consumoDe)  || new Date(hoje.getTime() - 30*86400000);
  const dAte = parseDataBR(consumoAte) || hoje;

  // Filter baixas in range
  const baixas = movimentacoes.filter(m => {
    if (m.tipo !== "baixa") return false;
    var d = new Date(m.ts); d.setHours(0,0,0,0);
    return d >= dDe && d <= dAte;
  });

  // Aggregate by product
  var agregado = {};
  baixas.forEach(function(m) {
    if (!agregado[m.produtoId]) agregado[m.produtoId] = { total: 0, movs: [] };
    agregado[m.produtoId].total += Number(m.qtd) || 0;
    agregado[m.produtoId].movs.push(m);
  });

  var itens = Object.keys(agregado).map(function(id) {
    return { id, produto: produtoById[id], total: agregado[id].total, movs: agregado[id].movs };
  }).sort(function(a,b) { return b.total - a.total; });

  var totalDias = Math.max(1, Math.ceil((dAte - dDe) / 86400000) + 1);

  var dfStr = consumoDe || (dDe.toLocaleDateString("pt-BR"));
  var dtStr = consumoAte || hoje.toLocaleDateString("pt-BR");

  // PDF export
  var gerarRelatorioPDF = function() {
    var linhas = itens.map(function(it, i) {
      var nome = (it.produto ? it.produto.nome : it.id).replace(/</g,"&lt;").replace(/>/g,"&gt;");
      var un = it.produto ? it.produto.unidade : "";
      var media = (it.total / totalDias).toFixed(2);
      var bg = i%2===0?"#fff":"#f9fafb";
      return "<tr style='background:" + bg + "'>" +
        "<td style='padding:7px 10px;border-bottom:1px solid #e5e7eb;font-size:12px'>" + (i+1) + "</td>" +
        "<td style='padding:7px 10px;border-bottom:1px solid #e5e7eb;font-size:12px;font-weight:500'>" + nome + "</td>" +
        "<td style='padding:7px 10px;border-bottom:1px solid #e5e7eb;font-size:12px;text-align:center;font-weight:700'>" + it.total + " " + un + "</td>" +
        "<td style='padding:7px 10px;border-bottom:1px solid #e5e7eb;font-size:12px;text-align:center'>" + it.movs.length + "</td>" +
        "<td style='padding:7px 10px;border-bottom:1px solid #e5e7eb;font-size:12px;text-align:center'>" + media + " " + un + "/dia</td>" +
        "</tr>";
    }).join("");

    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'>" +
      "<title>Consumo HVA " + dfStr + " a " + dtStr + "</title>" +
      "<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;color:#1a1a1a;padding:28px;background:#fff}" +
      ".np{margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;padding:12px;background:#f0fdf4;border-radius:8px;border:1px solid #86efac}" +
      "button{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}" +
      "@media print{.np{display:none!important}@page{margin:1.5cm}}</style></head><body>" +
      "<div class='np'>" +
        "<button id='bp' style='background:#1a4f3a;color:#fff'>📄 Salvar como PDF</button>" +
      "</div>" +
      "<div style='border:2px solid #1a4f3a;border-radius:10px;overflow:hidden;margin-bottom:16px'>" +
        "<div style='background:#1a4f3a;color:#fff;padding:14px 20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px'>" +
          "<div><div style='font-size:18px;font-weight:800'>Hospital Veterinário Araújo</div>" +
          "<div style='font-size:12px;opacity:.85;margin-top:2px'>Relatório de Consumo de Insumos</div></div>" +
          "<div style='text-align:right;font-size:13px;font-weight:700'>" + dfStr + " até " + dtStr + "</div>" +
        "</div>" +
        "<div style='padding:12px 20px;background:#f0fdf4;display:flex;gap:32px;flex-wrap:wrap'>" +
          "<div><div style='font-size:11px;color:#6b7280;font-weight:700;text-transform:uppercase'>Período</div>" +
          "<div style='font-size:14px;font-weight:700'>" + totalDias + " dias</div></div>" +
          "<div><div style='font-size:11px;color:#6b7280;font-weight:700;text-transform:uppercase'>Produtos consumidos</div>" +
          "<div style='font-size:14px;font-weight:700'>" + itens.length + "</div></div>" +
          "<div><div style='font-size:11px;color:#6b7280;font-weight:700;text-transform:uppercase'>Total de baixas</div>" +
          "<div style='font-size:14px;font-weight:700'>" + baixas.length + "</div></div>" +
        "</div>" +
      "</div>" +
      "<table style='width:100%;border-collapse:collapse'>" +
        "<thead><tr style='background:#1a4f3a;color:#fff'>" +
          "<th style='padding:10px;font-size:12px;text-align:left;width:36px'>#</th>" +
          "<th style='padding:10px;font-size:12px;text-align:left'>Produto</th>" +
          "<th style='padding:10px;font-size:12px;text-align:center;width:130px'>Total consumido</th>" +
          "<th style='padding:10px;font-size:12px;text-align:center;width:100px'>Baixas</th>" +
          "<th style='padding:10px;font-size:12px;text-align:center;width:140px'>Média diária</th>" +
        "</tr></thead>" +
        "<tbody>" + linhas + "</tbody>" +
      "</table>" +
      "<div style='margin-top:20px;text-align:center;font-size:10px;color:#9ca3af'>" +
        "Gerado pelo Sistema de Gestão de Estoque — HVA · " + new Date().toLocaleString("pt-BR") +
      "</div>" +
      "</body></html>";

    var w = window.open("","_blank");
    if (!w) { alert("Pop-up bloqueado! Permita pop-ups para este arquivo."); return; }
    w.document.write(html);
    w.document.close();
    w.document.getElementById("bp").onclick = function() { w.print(); };
  };

  return (
    <div>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
        <h2 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: "#1a4f3a" }}>📊 Relatório de Consumo</h2>
        <span style={{ background: "#e0f2fe", color: "#0369a1", padding: "3px 10px", borderRadius: 20, fontSize: 12, fontWeight: 700 }}>
          {itens.length} produtos · {baixas.length} baixas
        </span>
      </div>

      {/* Filtro de período */}
      <div style={{ background: "#fff", borderRadius: 10, padding: "16px 20px", marginBottom: 20, boxShadow: "0 1px 3px rgba(0,0,0,.07)", display: "flex", gap: 16, alignItems: "flex-end", flexWrap: "wrap" }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", marginBottom: 5 }}>De</div>
          <input type="text" value={consumoDe} onChange={e => setConsumoDe(maskData(e.target.value))}
            placeholder="DD/MM/AAAA" maxLength={10}
            style={{ padding: "8px 12px", borderRadius: 7, border: "1.5px solid #d1d5db", fontSize: 13, width: 130, textAlign: "center" }} />
        </div>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", marginBottom: 5 }}>Até</div>
          <input type="text" value={consumoAte} onChange={e => setConsumoAte(maskData(e.target.value))}
            placeholder="DD/MM/AAAA" maxLength={10}
            style={{ padding: "8px 12px", borderRadius: 7, border: "1.5px solid #d1d5db", fontSize: 13, width: 130, textAlign: "center" }} />
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {[
            { label: "Últimos 7d", dias: 7 },
            { label: "30d", dias: 30 },
            { label: "90d", dias: 90 },
            { label: "1 ano", dias: 365 },
          ].map(function(opt) {
            var d = new Date(hoje.getTime() - opt.dias*86400000);
            var fmt = function(dt) { return String(dt.getDate()).padStart(2,"0")+"/"+String(dt.getMonth()+1).padStart(2,"0")+"/"+dt.getFullYear(); };
            return (
              <button key={opt.label}
                onClick={() => { setConsumoDe(fmt(d)); setConsumoAte(fmt(hoje)); }}
                style={{ padding: "8px 14px", borderRadius: 8, border: "1.5px solid #d1d5db", cursor: "pointer", fontSize: 12, fontWeight: 700, background: "#f3f4f6", color: "#374151" }}>
                {opt.label}
              </button>
            );
          })}
        </div>
        <div style={{ marginLeft: "auto" }}>
          <button onClick={gerarRelatorioPDF}
            style={{ padding: "9px 18px", background: "#1a4f3a", color: "#fff", border: "none", borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
            📄 Exportar PDF
          </button>
        </div>
      </div>

      {/* Resumo período */}
      <div style={{ background: "#f0fdf4", border: "1px solid #86efac", borderRadius: 8, padding: "10px 16px", marginBottom: 16, fontSize: 13, color: "#166534" }}>
        Exibindo consumo de <strong>{dfStr}</strong> até <strong>{dtStr}</strong> — <strong>{totalDias} dias</strong>
        {!parseDataBR(consumoDe) && " (últimos 30 dias por padrão)"}
      </div>

      {/* Tabela */}
      {itens.length === 0 ? (
        <div style={{ background: "#fff", borderRadius: 10, padding: "40px", textAlign: "center", color: "#9ca3af" }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>📊</div>
          <div style={{ fontWeight: 700, fontSize: 15 }}>Nenhuma baixa registrada neste período</div>
          <div style={{ fontSize: 12, marginTop: 6 }}>Registre baixas de produtos para ver o consumo aqui.</div>
        </div>
      ) : (
        <div style={{ background: "#fff", borderRadius: 10, overflow: "hidden", boxShadow: "0 1px 3px rgba(0,0,0,.07)" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ background: "#f9fafb", borderBottom: "2px solid #e5e7eb" }}>
                <th style={{ ...TH, textAlign: "left", paddingLeft: 14 }}>#</th>
                <th style={{ ...TH, textAlign: "left" }}>Produto</th>
                <th style={{ ...TH, background: "#eff6ff", color: "#1d4ed8" }}>Total consumido</th>
                <th style={TH}>Nº baixas</th>
                <th style={{ ...TH, background: "#fef3c7", color: "#92400e" }}>Média / dia</th>
                <th style={{ ...TH, background: "#f0fdf4", color: "#166534" }}>Projeção 30d</th>
              </tr>
            </thead>
            <tbody>
              {itens.map(function(it, i) {
                var p = it.produto;
                var un = p ? p.unidade : "";
                var media = it.total / totalDias;
                var proj30 = Math.round(media * 30);
                return (
                  <tr key={it.id} style={{ borderBottom: "1px solid #f3f4f6", background: i%2===0?"#fff":"#fafafa" }}>
                    <td style={{ ...TD, color: "#9ca3af", paddingLeft: 14 }}>{i+1}</td>
                    <td style={{ ...TD, textAlign: "left" }}>
                      <div style={{ fontWeight: 600 }}>{p ? p.nome : it.id}</div>
                      {p && <div style={{ fontSize: 10, color: "#9ca3af" }}>{p.tabela} · {p.grupo}</div>}
                    </td>
                    <td style={{ ...TD }}>
                      <span style={{ fontWeight: 800, fontSize: 15, color: "#1d4ed8" }}>{it.total}</span>
                      <span style={{ fontSize: 11, color: "#9ca3af", marginLeft: 3 }}>{un}</span>
                    </td>
                    <td style={{ ...TD, color: "#6b7280" }}>{it.movs.length}x</td>
                    <td style={{ ...TD }}>
                      <span style={{ fontWeight: 700, color: "#92400e" }}>{media.toFixed(2)}</span>
                      <span style={{ fontSize: 10, color: "#9ca3af", marginLeft: 2 }}>{un}/dia</span>
                    </td>
                    <td style={{ ...TD }}>
                      <span style={{ fontWeight: 700, color: "#166534" }}>{proj30}</span>
                      <span style={{ fontSize: 10, color: "#9ca3af", marginLeft: 2 }}>{un}</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

const TH = { padding: "8px 10px", fontSize: 11, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: ".5px", textAlign: "center", whiteSpace: "nowrap" };
const TD = { padding: "7px 10px", textAlign: "center", verticalAlign: "middle" };
const INPUT = { width: "100%", padding: "8px 10px", borderRadius: 7, border: "1.5px solid #d1d5db", fontSize: 13, outline: "none", boxSizing: "border-box" };
const btnSmall = { padding: "4px 10px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 700 };
const btnStyle = (bg, color) => ({ padding: "8px 16px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 700, background: bg, color });

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
